<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGHMS - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🏥 TGHMS</h1>
                <p>Talavera General Hospital Hemodialysis Management System</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">Login</button>

                <div id="loginMessage" class="message"></div>
            </form>

            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #bdc3c7; font-size: 12px; color: #7f8c8d;">
                <p><strong>Demo Credentials:</strong></p>
                <p>👤 Admin: <strong>admin</strong> / <strong>admin123</strong></p>
                <p>👩‍⚕️ Nurse: <strong>nurse1</strong> / <strong>nurse123</strong></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
